services:
  swiftdeploy-app:
    image: swift-deploy-1-node:latest
    container_name: swiftdeploy-app
 
    environment:
      - MODE=stable
      - APP_VERSION=1.0
      - APP_PORT=3000

    expose:
      - "3000"
 
    networks:
      - swiftdeploy-net
 
    restart: unless-stopped
 
    # Named volume for logs
    volumes:
      - app_logs:/var/log/app
 
    # Health check hits /healthz inside the container
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
 
    # Security — drop all Linux capabilities
    cap_drop:
      - ALL
 
  nginx:
    image: nginx:latest
    container_name: swiftdeploy-nginx
 
    ports:
      # Only Nginx port is exposed to the host
      - "8080:8080"
 
    volumes:
      # Mount the generated nginx.conf into the container
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
 
    networks:
      - swiftdeploy-net
 
    restart: unless-stopped
 
    depends_on:
      swiftdeploy-app:
        condition: service_healthy
 

volumes:
  app_logs:
  nginx_logs:
 
networks:
  swiftdeploy-net:
    driver: bridge